# Render Blueprint — RSN Backend
# This file tells Render how to deploy the backend server.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rsn-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:shared && npm run build:server
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: EMAIL_FROM
        value: noreply@rsn.network
      - key: EMAIL_PROVIDER
        value: resend
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_POOL_MAX
        value: "10"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MAGIC_LINK_SECRET
        sync: false
      - key: MAGIC_LINK_EXPIRY_MINUTES
        value: "60"
      - key: RESEND_API_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
