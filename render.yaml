# Render Blueprint — RSN Backend
# This file tells Render how to deploy the backend server.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rsn-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:shared && npm run build:server
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: LOG_LEVEL
        value: info
