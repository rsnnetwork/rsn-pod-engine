# Render Blueprint — RSN Backend
# This file tells Render how to deploy the backend server.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rsn-api
    runtime: node
    region: frankfurt
    # CRITICAL: this MUST match the live Render dashboard plan exactly.
    # Render syncs render.yaml on every deploy and will auto-downgrade
    # the live service if the YAML drifts. Past incident: 2026-04-20 a
    # code-only push triggered a Blueprint sync that reverted the live
    # service from Starter back to Free (the value pre-existing here
    # since 2026-03-06). Stefan upgraded the dashboard to Standard on
    # 2026-04-27; this commit syncs IaC. Blueprint autoSync is OFF so
    # this value is documentation, not the source of truth.
    plan: standard
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:shared && npm run build:server && cp -r server/src/db/migrations server/dist/db/
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: EMAIL_FROM
        value: noreply@rsn.network
      - key: EMAIL_PROVIDER
        value: resend
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_MIN
        value: "5"
      - key: DB_POOL_MAX
        value: "40"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MAGIC_LINK_SECRET
        sync: false
      - key: MAGIC_LINK_EXPIRY_MINUTES
        value: "60"
      - key: RESEND_API_KEY
        sync: false
      - key: SCRAPINGDOG_API_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      # Tier-1 A7: leave RATE_LIMIT_STORE unset for in-process counters on
      # single-instance deploys. Set to "redis" when rolling out multiple
      # instances so rate quotas apply globally.
      # - key: RATE_LIMIT_STORE
      #   value: "redis"

      # Redis — the live service reads this from the Render dashboard. It's
      # declared here so IaC deploys stay in sync; value is set at runtime.
      - key: REDIS_URL
        sync: false
      - key: REDIS_CHAT_TTL_SECONDS
        value: "14400"
      - key: REDIS_SESSION_TTL_SECONDS
        value: "14400"

      # Tier-1 A6: Socket.IO transport pinning override. Default in the code
      # is ['websocket']; set to "websocket,polling" to re-enable long-
      # polling fallback. Only needed for clients behind restrictive
      # corporate proxies that block WebSocket upgrades.
      # - key: SOCKET_IO_TRANSPORTS
      #   value: "websocket,polling"

      # Tier-1 A3: session-scoped timeout registry feature flag. Default on.
      # - key: SESSION_TIMEOUT_REGISTRY_ENABLED
      #   value: "true"
